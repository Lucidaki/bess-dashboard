# UK Market Constraints & Rules
# Defines market-specific regulations and constraints

uk_balancing_mechanism:
  bm_unit_registration_required: true
  settlement_periods_per_day: 48  # 30-minute settlement periods

  price_caps:
    max_gbp_per_mwh: 6000   # Maximum allowed price (£/MWh)
    min_gbp_per_mwh: -1000  # Minimum allowed price (£/MWh)

  charges:
    bsuos_apply: true  # Balancing Services Use of System charges apply
    bsuos_typical_gbp_per_mwh: 2.5  # Typical BSUoS charge (for future revenue adjustments)

  grid_code:
    frequency_response_mandatory: false  # Frequency response requirements
    dynamic_containment: false           # Dynamic Containment service (future enhancement)
    dynamic_moderation: false            # Dynamic Moderation service (future enhancement)
    dynamic_regulation: false            # Dynamic Regulation service (future enhancement)

  settlement:
    period_duration_min: 30
    periods_per_day: 48
    period_numbering: "1_to_48"  # Settlement periods numbered 1-48

# Future: Other markets can be added here (EU, US, Australia)
# eu_market:
#   settlement_duration_min: 60
#   ...

# us_market:
#   settlement_duration_min: 5
#   ...

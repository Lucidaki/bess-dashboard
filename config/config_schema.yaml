# BESS Dashboard MVP Configuration
# Version: 1.0.0

project:
  name: "BESS Dashboard MVP"
  version: "1.0.0"
  description: "Ampyr Asset Intelligence Platform - BESS Optimization"

market:
  name: "UK"
  settlement_duration_min: 30  # UK-specific 30-minute settlement periods
  timezone: "Europe/London"
  currency: "GBP"
  data_source: "csv"  # Options: "csv", "api" (future)

bess_assets:
  UK_BESS_001:
    # ACTUAL BESS PARAMETERS - Updated 2025-11-11
    capacity_mwh: 8.4           # Useable energy capacity in MWh
    power_mw: 7.5               # Maximum power rating in MW (nameplate)
    rte_percent: 87.0           # Round-trip efficiency percentage

    constraints:
      soc_min_percent: 5.0      # Minimum State of Charge (%)
      soc_max_percent: 95.0     # Maximum State of Charge (%)

      # Asymmetric network constraints (important for optimization)
      power_export_max_mw: 7.5  # Maximum export to grid (discharge) in MW
      power_import_max_mw: 4.2  # Maximum import from grid (charge) in MW

    degradation:
      annual_fade_percent: 2.5  # Annual capacity degradation rate (2.5-3% range)
      model: "linear"           # Options: "linear", "piecewise"

    warranty:
      max_lifetime_cycles: 8200      # Total lifetime cycle limit (1.5 cycles/day × 365 days × 15 years)
      max_daily_cycles: 1.5          # Maximum cycles per day

    grid_code:
      frequency_response_hold_min: null  # Set if applicable (e.g., 30)
      ramp_rate_mw_per_min: null         # Set if applicable (e.g., 0.5)

data_quality:
  min_dq_score: 80  # Minimum overall DQ score to proceed with optimization
  remediation: "interpolate"  # Options: "interpolate", "reject"

  weights:
    completeness: 0.4
    continuity: 0.3
    bounds: 0.2
    energy_reconciliation: 0.1

optimization:
  solver: "PULP_CBC_CMD"  # PuLP solver backend
  time_limit_sec: 30      # Maximum solver time
  mip_gap_tolerance: 0.01  # MIP gap tolerance (1%)
  objective: "maximize_revenue"

visualization:
  theme: "plotly_white"  # Plotly theme

  color_palette:
    primary: "#1f77b4"     # Blue
    secondary: "#ff7f0e"   # Orange
    success: "#2ca02c"     # Green
    warning: "#ff9800"     # Amber
    danger: "#d62728"      # Red
    neutral: "#7f7f7f"     # Gray

  chart_config:
    font_size: 12
    title_font_size: 14
    show_grid: true
    margin_px: 50
